[pytest]
# Test Descovery Patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Python Path
pythonpath = . orchestrator

# Test Path
testpaths = tests

# Coverage Options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=orchestrator
    --cov_report=term-missing
    --cov-report=html

# Markers for categorizing tests
markers = 
    unit: Unit tests that test individual functions/classes in isolation.
    integration: Integration tests that test multiple components working together.
    slow: Tests that take along time to run.
    requires_db: Tests that require a database connection.

# Logging
log_cli = false
log_cli_level = INFO

# Coverage minimum (start at 80%, increase as you add tests)
# Uncomment to enforce coverage minimum:
# --cov-fail-under=80